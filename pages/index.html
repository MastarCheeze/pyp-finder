<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Courier New', Courier, monospace;
      background-color: #34d399;
    }

    main {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: center;
      align-items: center;
      height: 100%;
      font-size: 1.5rem;
    }

    #title {
      font-size: 5rem;
    }

    #subtitle {
      margin-top: 2em;
    }

    #link {
      margin-top: 0.5em;
    }

    #link a {
      color: #022c22;
      transition: color 0.3s ease;
    }

    #link a:hover {
      color: #047857;
    }
  </style>
</head>

<body>
  <main>
    <h1 id="title">We've Moved!</h1>
    <p id="subtitle">Check out my brand-spanking-new PYP Finder website at:</p>
    <p id="link"><a href="https://pypfinder.mastarcheeze.com">https://pypfinder.mastarcheeze.com</a></p>
  </main>
</body>

</html>
